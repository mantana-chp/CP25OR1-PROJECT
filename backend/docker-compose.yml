version: "3.9"

services:
  backend:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: backend
    env_file:
      - .env
    expose:
      - "3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"   # can be deleted later
    networks:
      - app_net
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - app_net
    restart: unless-stopped
    # For local development: uncomment the ports below to access MinIO console at http://localhost:9001
    # For production: keep ports commented (not exposed publicly, backend connects internally)
    # ports:
    #   - "9000:9000"   # MinIO API
    #   - "9001:9001"   # MinIO Console (Web UI)

networks:
  app_net:
    external: true

volumes:
  minio_data:
    driver: local
