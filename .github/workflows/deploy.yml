name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*' # Triggers only when you push a tag like v1.0.0

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. PREPARE THE ARTIFACT
      # zip ONLY the backend folder to send to the server.
      - name: Create Deployment Archive
        run: |
          # Compressing the backend folder into a file named deploy.tar.gz
          tar -czf deploy.tar.gz backend

      # 2. COPY FILE TO VM
      - name: Copy Archive to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'deploy.tar.gz'
          target: '/tmp' # upload to /tmp first

      # 3. EXTRACT, INSTALL & LINK
      - name: Extract and Link
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # --- CONFIGURATION ---
            APP_NAME="pet-health-api"
            # This must match the folder you created in Step 1
            BASE_DIR="/home/${{ secrets.SSH_USER }}/pet-health"
            # The folder name inside the zip (must match what you zipped in Step 1)
            BACKEND_FOLDER="backend" 

            # Use the Tag Name for the folder (e.g., v1.0.0)
            VERSION="${{ github.ref_name }}"
            NEW_RELEASE_DIR="$BASE_DIR/releases/$VERSION"

            # --- STEPS ---
            echo "Deploying version $VERSION..."

            # 1. Create directory for this specific version
            mkdir -p $NEW_RELEASE_DIR

            # 2. Extract the code
            tar -xzf /tmp/deploy.tar.gz -C $NEW_RELEASE_DIR
            rm /tmp/deploy.tar.gz

            # 3. Install Dependencies
            echo "Installing dependencies..."
            cd $NEW_RELEASE_DIR/$BACKEND_FOLDER
            npm install --production

            # 4. Run Migrations
            echo "Running Migrations..."
            export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            npx prisma migrate deploy

            # 5. Update Symlink (The "Switch" moment)
            # This points 'current' to the new version folder
            ln -sfn $NEW_RELEASE_DIR $BASE_DIR/current

            # 6. Reload PM2
            # If the app is running, reload it. If not, echo a message.
            pm2 reload $APP_NAME || echo "App not running yet. You must start it manually first!"
